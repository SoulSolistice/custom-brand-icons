name: Auto Release

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine previous release tag
        id: prev_tag
        shell: bash
        run: |
          set -euo pipefail

          # Only consider release tags in the expected YYYY.MM.N format
          PREV_TAG="$(
            git tag --list '[0-9][0-9][0-9][0-9].[0-1][0-9].*' \
              --sort=-v:refname \
            | head -n 1
          )"

          echo "previous_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: '${PREV_TAG}'"

      - name: Detect changed icons
        id: changed_icons
        shell: bash
        run: |
          set -euo pipefail

          PREV_TAG="${{ steps.prev_tag.outputs.previous_tag }}"

          if [ -z "$PREV_TAG" ]; then
            find icon-svg -type f -name '*.svg' | sort > changed_icons.txt
          else
            git diff --name-only "$PREV_TAG"..HEAD -- \
              | grep -E '^icon-svg/[^/]+\.svg$' \
              | sort -u > changed_icons.txt || true
          fi

          if [ -s changed_icons.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed icons:"
            cat changed_icons.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No icon changes detected."
          fi

      - name: Determine next tag
        if: steps.changed_icons.outputs.has_changes == 'true'
        id: next_tag
        shell: bash
        run: |
          set -euo pipefail

          YEAR="$(date -u +%Y)"
          MONTH="$(date -u +%m)"
          PREFIX="${YEAR}.${MONTH}"

          HIGHEST="$(
            git tag --list "${PREFIX}.*" \
              | sed -E "s/^${YEAR}\.${MONTH}\.//" \
              | grep -E '^[0-9]+$' \
              | sort -n \
              | tail -n 1 || true
          )"

          COUNTER=$(( ${HIGHEST:-0} + 1 ))
          NEW_TAG="${PREFIX}.${COUNTER}"

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${NEW_TAG}"

      - name: Setup Node.js
        if: steps.changed_icons.outputs.has_changes == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Build distribution
        if: steps.changed_icons.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node custom-icons-builder.cjs

      - name: Generate release notes
        if: steps.changed_icons.outputs.has_changes == 'true'
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          PREV_TAG="${{ steps.prev_tag.outputs.previous_tag }}"
          NEW_TAG="${{ steps.next_tag.outputs.new_tag }}"
          RAW_BASE="https://raw.githubusercontent.com/${REPO}/main/icon-svg"
          NOTES_FILE="$(mktemp)"
          COMPARE_FILE="$(mktemp)"

          trap 'rm -f "$COMPARE_FILE"' EXIT

          if [ -n "$PREV_TAG" ]; then
            gh api \
              "repos/${REPO}/compare/${PREV_TAG}...HEAD?per_page=100" \
              > "$COMPARE_FILE"
            RANGE_LABEL="${PREV_TAG}...${NEW_TAG}"
          else
            # First release: compare against the initial commit
            FIRST_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            gh api \
              "repos/${REPO}/compare/${FIRST_COMMIT}...HEAD?per_page=100" \
              > "$COMPARE_FILE"
            RANGE_LABEL="initial...${NEW_TAG}"
          fi

          ICON_COUNT="$(find icon-svg -type f -name '*.svg' | wc -l | tr -d ' ')"

          {
            echo "**Total icons in repository:** ${ICON_COUNT}"
            echo
            echo "## New / changed icons"
            echo
            echo "| Icon | Name |"
            echo "|:----:|------|"

            while IFS= read -r f; do
              [ -n "$f" ] || continue
              NAME="$(basename "$f" .svg)"
              echo "| <img src=\"${RAW_BASE}/${NAME}.svg\" width=\"24\" height=\"24\"> | \`${NAME}\` |"
            done < changed_icons.txt

            echo
            echo "## Contributors"
            echo

            jq -r '
              [
                .commits[]
                | select(
                    .author != null and
                    (.author.type // "") != "Bot" and
                    (.author.login // "" | test("\\[bot\\]$") | not) and
                    (.author.login // "") != "github-actions"
                  )
                | .author.login
              ]
              | unique
              | sort
              | if length == 0 then
                  ["_No non-bot contributors found in this release range._"]
                else
                  map("- [@" + . + "](https://github.com/" + . + ")")
                end
              | .[]
            ' "$COMPARE_FILE"

            echo
            echo "## Commits"
            echo

            jq -r '
              [
                .commits[]
                | select(
                    .commit.message != null and
                    (.commit.message | startswith("Merge pull request #") | not) and
                    (.commit.message | startswith("Merge branch ") | not) and
                    (.author != null) and
                    (.author.type // "") != "Bot" and
                    (.author.login // "" | test("\\[bot\\]$") | not) and
                    (.author.login // "") != "github-actions"
                  )
                | "- " + (.commit.message | split("\n")[0]) + " by @" + .author.login
              ]
              | if length == 0 then
                  ["_No non-bot direct commits found in this release range._"]
                else
                  .
                end
              | .[]
            ' "$COMPARE_FILE"

            echo
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog:** https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG}"
            else
              echo "_First automated release._"
            fi
          } > "$NOTES_FILE"

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.changed_icons.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.next_tag.outputs.new_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            dist/custom-brand-icons.js \
            --title "$NEW_TAG" \
            --verify-tag \
            --notes-file "${{ steps.release_notes.outputs.notes_file }}"

          echo "Release $NEW_TAG published."